argo-cd:
  global:
    domain: demo.gitops-promoter.dev

  controller:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 768Mi

  repoServer:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi

  # Source hydrator (alpha): renders dry manifests and pushes to Git; required for GitOps Promoter’s
  # Argo CD integration. See https://argo-cd.readthedocs.io/en/stable/user-guide/source-hydrator/
  commitServer:
    enabled: true

  server:
    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: demo.gitops-promoter.dev
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/backend-protocol: HTTP
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        # Per-client-IP; ~normal browsing; raise or use limit-whitelist for GitHub hooks if needed
        nginx.ingress.kubernetes.io/limit-rps: "20"
        nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
      tls: true
    # GitOps Promoter UI extension (https://gitops-promoter.readthedocs.io/en/latest/argocd-integrations/).
    # Versions: Renovate — github-releases argoproj-labs/gitops-promoter (URLs below) + docker quay.io/argoprojlabs/argocd-extension-installer (image). Not the gitops-promoter Helm chart.
    initContainers:
      - name: extension-gitops-promoter
        image: quay.io/argoprojlabs/argocd-extension-installer:v1.0.0@sha256:7acac56647437f36b8b4682579c1efcbc8a45118a3c5892e1ea6bf746a2a59ba
        env:
          - name: EXTENSION_NAME
            value: gitops-promoter
          - name: EXTENSION_URL
            value: https://github.com/argoproj-labs/gitops-promoter/releases/download/v0.27.1/gitops-promoter-argocd-extension.tar.gz
          - name: EXTENSION_CHECKSUM_URL
            value: https://github.com/argoproj-labs/gitops-promoter/releases/download/v0.27.1/gitops-promoter_0.27.1_checksums.txt
        volumeMounts:
          - name: extensions
            mountPath: /tmp/extensions/
        securityContext:
          runAsUser: 1000
          allowPrivilegeEscalation: false
    volumeMounts:
      - name: extensions
        mountPath: /tmp/extensions/
    volumes:
      - name: extensions
        emptyDir: {}
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  redis:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  dex:
    resources:
      requests:
        cpu: 25m
        memory: 64Mi

  configs:
    # GitHub webhook HMAC: indirection only (safe in Git). Argo CD reads the literal
    # "$<secret>:<key>" from argocd-secret and resolves the value from that Secret at runtime.
    # Target Secret: seal and commit charts/argocd/templates/argocd-github-webhook.sealed.yaml
    # (same Argo CD Application as the argocd umbrella chart).
    #
    # GitLab project webhook → /api/webhook: seal argocd-gitlab-webhook.sealed.yaml (see docs/gitlab-demo-setup.md §6).
    secret:
      githubSecret: "$argocd-github-webhook:githubWebhookSecret"
      gitlabSecret: "$argocd-gitlab-webhook:gitlabWebhookSecret"
    params:
      server.disable.auth: "false"
      server.insecure: "true"
      # Enables hydrator controller + commit server wiring in argo-helm (restart app controller / API server on change).
      hydrator.enabled: "true"
    rbac:
      # Anonymous UI (users.anonymous.enabled) uses policy.default. Dex orgs/teams below limits GitHub login to
      # argoproj-labs/gitops-promoter-approvers; that group maps to role:admin via policy.csv.
      policy.default: role:readonly
      policy.csv: |
        g, argoproj-labs:gitops-promoter-approvers, role:admin
    cm:
      # Hydrator git author: commit.author.name / commit.author.email (argocd-cm) are implemented only after
      # https://github.com/argoproj/argo-cd/pull/25746 — not in Argo CD v3.3.6 (current stable). Until you upgrade,
      # commits stay Author "Argo CD <argo-cd@example.com>"; Signed-off-by below must match for DCO (restart does not help).
      # After upgrade, uncomment and align with Signed-off-by:
      # commit.author.name: "GitOps Promoter Maintainers"
      # commit.author.email: "maintainers@gitops-promoter.dev"
      # Hydrated commit subject/body (default-style template + DCO sign-off). Not GPG signing; see
      # https://argo-cd.readthedocs.io/en/stable/user-guide/source-hydrator/#commit-message-template
      sourceHydrator.commitMessageTemplate: |
        {{.metadata.drySha | trunc 7}}: {{ .metadata.subject }}
        {{- if .metadata.body }}

        {{ .metadata.body }}
        {{- end }}
        {{ range $ref := .metadata.references }}
        {{- if and $ref.commit $ref.commit.author }}
        Co-authored-by: {{ $ref.commit.author }}
        {{- end }}
        {{- end }}
        {{- if .metadata.author }}
        Co-authored-by: {{ .metadata.author }}
        {{- end }}

        Signed-off-by: Argo CD <argo-cd@example.com>
      url: https://demo.gitops-promoter.dev
      # Unauthenticated browser/API: read-only via policy.default (see rbac above).
      # https://argo-cd.readthedocs.io/en/stable/operator-manual/argocd-cm-yaml/
      users.anonymous.enabled: "true"
      # Embedded Dex → GitHub (client ID/secret in Secret/argocd-dex-github).
      # orgs/teams: only members of this team may complete GitHub login; Dex emits `groups` for RBAC (policy.csv).
      # https://argo-cd.readthedocs.io/en/stable/operator-manual/user-management/#configuring-github-oauth2
      dex.config: |
        connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $argocd-dex-github:clientId
            clientSecret: $argocd-dex-github:clientSecret
            orgs:
            - name: argoproj-labs
              teams:
              - gitops-promoter-approvers
            teamNameField: slug
      resource.customLabels: promoter.argoproj.io/commit-status
      resource.links: |
        - url: '{{.resource.status.url}}'
          title: Pull Request
          icon.class: fa-code-pull-request
          if: resource.apiVersion == "promoter.argoproj.io/v1alpha1" && resource.kind == "PullRequest" && resource.status.url != nil && resource.status.url != ""
        - url: '{{.resource.status.pullRequest.url}}'
          title: Pull Request
          icon.class: fa-code-pull-request
          if: resource.apiVersion == "promoter.argoproj.io/v1alpha1" && resource.kind == "ChangeTransferPolicy" && resource.status.pullRequest != nil && resource.status.pullRequest.url != nil && resource.status.pullRequest.url != ""
