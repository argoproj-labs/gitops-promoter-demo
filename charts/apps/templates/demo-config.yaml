apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: HEAD
    path: manifests
    directory:
      recurse: true
      # Churn CronJobs sync via Application/demo-churn (manifests/demo-churn/**).
      exclude: "{demo-churn/**}"
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-promoter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
