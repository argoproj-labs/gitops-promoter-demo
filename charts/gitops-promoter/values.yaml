gitops-promoter:
  manager:
    resources:
      requests:
        cpu: 25m
        memory: 48Mi
      limits:
        cpu: 200m
        memory: 128Mi

  # PR body deep link to the GitOps Promoter Argo CD extension (same idea as
  # https://github.com/argoproj-labs/gitops-promoter/pull/1287). Forks: set the
  # hostname to match charts/argocd (global.domain / configs.cm url).
  controllerConfiguration:
    pullRequest:
      template:
        title: "Promote {{ trunc 5 .ChangeTransferPolicy.Status.Proposed.Dry.Sha }} to `{{ .ChangeTransferPolicy.Spec.ActiveBranch }}`"
        description: |
          This PR is promoting the environment branch `{{ .ChangeTransferPolicy.Spec.ActiveBranch }}` which is currently on dry sha {{ .ChangeTransferPolicy.Status.Active.Dry.Sha }} to dry sha {{ .ChangeTransferPolicy.Status.Proposed.Dry.Sha }}.

          {{/* Promoter uses Go API types: Name, Namespace, Annotations (not .metadata.*) */}}
          {{- with .PromotionStrategy }}
          {{- $promoURL := urlParse "https://demo.gitops-promoter.dev" }}
          {{- $promoTrackID := index .Annotations "argocd.argoproj.io/tracking-id" }}
          {{- if $promoTrackID }}
          {{- $promoApp := index (splitList ":" $promoTrackID) 0 }}
          {{- $promoQuery := printf "promotionstrategy=%s%%2F%s" .Namespace .Name }}
          {{- $promoRawQuery := join "&" (list "resource=" "view=GitOps+Promoter" $promoQuery) }}
          {{- $_ := set $promoURL "path" (printf "/applications/%s" $promoApp) }}
          {{- $_ = set $promoURL "query" $promoRawQuery }}
          [View PromotionStrategy in Argo CD]({{ urlJoin $promoURL }})
          {{- end }}
          {{- end }}

  # Upstream ServiceMonitor selector does not match the metrics Service labels (chart 0.5.1); use umbrella SM below.
  prometheus:
    enable: false

  # Chart 0.5.1 does not render an Ingress here; if you add one for promoter-webhook.*, use the same limit-rps as Argo/Grafana.
  webhookReceiver:
    ingress:
      enabled: true
      ingressClassName: nginx
      hostname: promoter-webhook.gitops-promoter.dev

# Replaces upstream ServiceMonitor with a selector aligned to Service/gitops-promoter-controller-manager-metrics-service.
controllerMetricsServiceMonitor:
  enabled: true
