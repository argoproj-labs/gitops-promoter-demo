apiVersion: promoter.argoproj.io/v1alpha1
kind: ScmProvider
metadata:
  name: demo-scm-gitlab
  namespace: gitops-promoter
spec:
  # SaaS gitlab.com: omit domain (setting "gitlab.com" is rejected by the API).
  gitlab: {}
  secretRef:
    # Create Secret/gitlab-scm-credentials in gitops-promoter with key "token" (project access token).
    # Token role must allow pushing to protected main (Maintainer by default — see docs/gitlab-demo-setup.md §2).
    name: gitlab-scm-credentials
